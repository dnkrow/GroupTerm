<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GroupTerm — Hub</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">GroupTerm <span class="muted">· hub</span></div>
    <div class="who">tu es <strong id="me">…</strong></div>
    <div id="relay" class="relay off">relais…</div>
  </header>

  <main>
    <!-- Colonne gauche : rooms -->
    <section id="rooms" class="panel">
      <h2>Rooms</h2>
      <ul id="room-list"></ul>
      <div class="room-actions">
        <button id="btn-open" title="Ouvrir un terminal sur ton PC dans la room sélectionnée">＋ Terminal ici</button>
        <button id="btn-open-named" title="Ouvrir un terminal nommé (ex. deux Claude en solo : claude-a et claude-b dans la même room)">＋ Terminal nommé…</button>
        <button id="btn-newroom" title="Créer une room et y ouvrir un terminal">＋ Nouvelle room</button>
      </div>
    </section>

    <!-- Centre : onglets chat / peek de la room sélectionnée -->
    <section id="center" class="panel">
      <div class="tabs">
        <span class="roomlabel">#<span id="chat-room">—</span></span>
        <button class="tab active" id="tab-chat" data-tab="chat">chat</button>
        <button class="tab" id="tab-peek" data-tab="peek">peek</button>
      </div>

      <div id="chat-view">
        <div id="messages"></div>
        <div id="say-to"></div>
        <form id="say-form">
          <input id="say-input" autocomplete="off" placeholder="say…  (préfixe @nom pour cibler)" />
          <button type="submit">Envoyer</button>
        </form>
      </div>

      <div id="peek-view" class="hidden">
        <div id="peek-targets"></div>
        <pre id="peek"></pre>
      </div>
    </section>

    <!-- Droite : présence (clic sur un membre = peek de son écran) -->
    <section id="side" class="panel">
      <h2>Présence</h2>
      <ul id="roster"></ul>
      <p class="hint">Clique une personne pour voir son écran (onglet peek).</p>
    </section>
  </main>

  <footer id="myterms">
    <span class="muted">Mes terminaux :</span>
    <span id="myterms-list"><span class="muted">aucun</span></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
