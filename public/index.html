<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GroupTerm — Hub</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">GroupTerm <span class="muted">· hub</span></div>
    <div class="who">tu es <strong id="me">…</strong></div>
    <div id="relay" class="relay off">relais…</div>
  </header>

  <main>
    <!-- Colonne gauche : rooms -->
    <section id="rooms" class="panel">
      <h2>Rooms</h2>
      <ul id="room-list"></ul>
      <div class="room-actions">
        <button id="btn-open" title="Ouvrir un terminal sur ton PC dans la room sélectionnée">＋ Terminal ici</button>
        <button id="btn-newroom" title="Créer une room et y ouvrir un terminal">＋ Nouvelle room</button>
      </div>
    </section>

    <!-- Centre : chat de la room sélectionnée -->
    <section id="chat" class="panel">
      <h2>#<span id="chat-room">—</span> · chat</h2>
      <div id="messages"></div>
      <form id="say-form">
        <input id="say-input" autocomplete="off" placeholder="say…  (préfixe @nom pour cibler)" />
        <button type="submit">Envoyer</button>
      </form>
    </section>

    <!-- Droite : roster + peek -->
    <section id="side" class="panel">
      <h2>Présence</h2>
      <ul id="roster"></ul>
      <div id="peek-wrap" class="hidden">
        <div class="peek-head">
          <span>écran de <strong id="peek-target"></strong></span>
          <button id="peek-stop" title="Arrêter">✕</button>
        </div>
        <pre id="peek"></pre>
      </div>
    </section>
  </main>

  <footer id="myterms">
    <span class="muted">Mes terminaux :</span>
    <span id="myterms-list"><span class="muted">aucun</span></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
